<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Model Viewer</title>

  <script src="aframe.min.js"></script>
  <script src="mindar-image-aframe.prod.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #03060f;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --accent: #00e5ff;
      --accent2: #7b61ff;
      --text: #e8edf5;
      --muted: rgba(232,237,245,0.45);
      --success: #00e5a0;
      --panel-h: 130px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: 'Syne', sans-serif;
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    /* ── A-Frame scene sits behind everything ── */
    a-scene {
      position: fixed !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      z-index: 0;
    }

    /* Transparent WebGL canvas so camera feed shows through */
    a-scene canvas {
      background: transparent !important;
    }

    /* MindAR camera video — fill screen behind everything */
    video, #mindar-ar-video {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      object-fit: cover !important;
      z-index: -1 !important;
    }

    /* ── Subtle overlays ── */
    .scanlines {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px
      );
    }
    .vignette {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 52%, rgba(3,6,15,0.65) 100%);
    }

    /* ── Corner brackets ── */
    .corner { position: fixed; z-index: 5; pointer-events: none; width: 26px; height: 26px; }
    .corner::before {
      content: ''; position: absolute;
      border-color: rgba(0,229,255,0.45); border-style: solid;
    }
    .corner-tl { top: 68px; left: 16px; }
    .corner-tl::before { top:0;left:0; width:100%;height:100%; border-width:2px 0 0 2px; border-radius:3px 0 0 0; }
    .corner-tr { top: 68px; right: 16px; }
    .corner-tr::before { top:0;right:0; width:100%;height:100%; border-width:2px 2px 0 0; border-radius:0 3px 0 0; }
    .corner-bl { bottom: calc(var(--panel-h) + 16px); left: 16px; }
    .corner-bl::before { bottom:0;left:0; width:100%;height:100%; border-width:0 0 2px 2px; border-radius:0 0 0 3px; }
    .corner-br { bottom: calc(var(--panel-h) + 16px); right: 16px; }
    .corner-br::before { bottom:0;right:0; width:100%;height:100%; border-width:0 2px 2px 0; border-radius:0 0 3px 0; }

    /* ── Top HUD ── */
    .hud-top {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      background: linear-gradient(to bottom, rgba(3,6,15,0.9), transparent);
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 32px; height: 32px;
      border: 1.5px solid var(--accent); border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 15px; height: 15px; color: var(--accent); }
    .logo-text { font-size: 14px; font-weight: 800; letter-spacing: 0.1em; }
    .logo-text span { color: var(--accent); }

    .hud-badge {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 11px;
      background: var(--surface);
      border: 1px solid var(--border); border-radius: 20px;
      font-family: 'DM Mono', monospace;
      font-size: 10px; letter-spacing: 0.1em; color: var(--muted);
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--success); box-shadow: 0 0 6px var(--success);
      animation: blink 2s ease-in-out infinite;
    }
    .status-dot.scanning { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Scan hint (centre) ── */
    .scan-hint {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%) translateY(-65px);
      z-index: 6; text-align: center; pointer-events: none;
      transition: opacity 0.4s;
    }
    .scan-hint.hidden { opacity: 0; }
    .scan-box {
      width: 160px; height: 160px;
      border: 1.5px solid rgba(0,229,255,0.22);
      border-radius: 14px; margin: 0 auto 12px;
      position: relative;
      animation: box-glow 2.5s ease-in-out infinite;
    }
    @keyframes box-glow {
      0%,100% { border-color: rgba(0,229,255,0.22); }
      50%      { border-color: rgba(0,229,255,0.55); box-shadow: 0 0 18px rgba(0,229,255,0.1); }
    }
    .scan-line {
      position: absolute; left: 0; right: 0; height: 1.5px;
      background: linear-gradient(to right, transparent, var(--accent), transparent);
      top: 0; animation: sweep 2.5s ease-in-out infinite;
    }
    @keyframes sweep { 0%{top:0%;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{top:100%;opacity:0} }
    .scan-hint p {
      font-family: 'DM Mono', monospace;
      font-size: 10px; letter-spacing: 0.14em;
      color: rgba(0,229,255,0.5); text-transform: uppercase;
    }

    /* ── Flash border ── */
    .flash {
      position: fixed; inset: 0; z-index: 8;
      border: 2px solid var(--success);
      opacity: 0; pointer-events: none;
    }
    .flash.go { animation: flash 0.55s ease forwards; }
    @keyframes flash { 0%{opacity:0.85} 100%{opacity:0} }

    /* ── Toast ── */
    .toast {
      position: fixed; top: 72px; left: 50%;
      transform: translateX(-50%) translateY(-6px);
      z-index: 20;
      background: rgba(3,6,15,0.93);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 7px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 10px; letter-spacing: 0.1em; color: var(--success);
      opacity: 0; pointer-events: none; white-space: nowrap;
      transition: opacity 0.3s, transform 0.3s;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Bottom panel ── */
    .panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
      height: var(--panel-h);
      padding: 12px 18px 28px;
      background: linear-gradient(to top, rgba(3,6,15,0.97) 70%, transparent);
      border-top: 1px solid var(--border);
    }
    .panel-inner { max-width: 480px; margin: 0 auto; }

    .info-row {
      display: flex; align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .model-info .label {
      font-family: 'DM Mono', monospace;
      font-size: 9px; letter-spacing: 0.12em;
      color: var(--muted); text-transform: uppercase;
    }
    .model-info .name { font-size: 13px; font-weight: 700; margin-top: 2px; }

    .angle-wrap { text-align: right; }
    .angle-num {
      font-family: 'DM Mono', monospace;
      font-size: 28px; font-weight: 300;
      color: var(--accent); line-height: 1;
      text-shadow: 0 0 22px rgba(0,229,255,0.3);
    }
    .angle-num sup { font-size: 13px; color: var(--muted); }
    .angle-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px; color: var(--muted);
      letter-spacing: 0.1em; text-transform: uppercase;
    }

    .controls { display: flex; gap: 10px; align-items: center; }

    .btn-icon {
      width: 46px; height: 46px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s; flex-shrink: 0;
    }
    .btn-icon:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.14); }
    .btn-icon svg { width: 17px; height: 17px; color: var(--muted); }

    .btn-rotate {
      flex: 1; padding: 13px;
      background: var(--accent); border: none; border-radius: 10px;
      color: #03060f;
      font-family: 'Syne', sans-serif;
      font-size: 13px; font-weight: 800;
      letter-spacing: 0.07em; text-transform: uppercase;
      cursor: pointer; position: relative; overflow: hidden;
      transition: box-shadow 0.2s, transform 0.15s;
      box-shadow: 0 4px 20px rgba(0,229,255,0.28);
    }
    .btn-rotate::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.22), transparent);
      opacity: 0; transition: opacity 0.2s;
    }
    .btn-rotate:hover::after { opacity: 1; }
    .btn-rotate:hover { box-shadow: 0 6px 28px rgba(0,229,255,0.45); }
    .btn-rotate:active { transform: scale(0.97); }
    .btn-rotate:disabled {
      background: var(--accent2);
      box-shadow: 0 4px 18px rgba(123,97,255,0.28);
      cursor: not-allowed; opacity: 0.8;
    }

    .ripple {
      position: absolute; border-radius: 50%;
      background: rgba(3,6,15,0.22);
      transform: scale(0);
      animation: rpl 0.5s linear forwards;
      pointer-events: none;
    }
    @keyframes rpl { to { transform: scale(4); opacity: 0; } }
  </style>
</head>
<body>

  <div class="scanlines"></div>
  <div class="vignette"></div>
  <div class="flash" id="flash"></div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Top HUD -->
  <div class="hud-top">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </div>
      <div class="logo-text">AR<span>SCAN</span></div>
    </div>
    <div class="hud-badge">
      <div class="status-dot scanning" id="statusDot"></div>
      <span id="statusText">SCANNING</span>
    </div>
  </div>

  <!-- Scan hint -->
  <div class="scan-hint" id="scanHint">
    <div class="scan-box"><div class="scan-line"></div></div>
    <p>Point at image target</p>
  </div>

  <div class="toast" id="toast"></div>

  <!--
    A-Frame / MindAR scene
    • camera enabled (embedded + arjs removed so MindAR controls it)
    • filterMinCF / filterBeta tuned to prevent drift jitter
    • missTolerance raised so brief occlusion doesn't lose tracking
  -->
  <a-scene
    mindar-image="imageTargetSrc: targets.mind;
                  filterMinCF: 0.001;
                  filterBeta: 0.01;
                  missTolerance: 5;
                  warmupTolerance: 5;"
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true;
              colorManagement: true;
              physicallyCorrectLights: true;
              alpha: true;"
  >
    <a-assets>
      <a-asset-item id="modelAsset" src="model/model.glb"></a-asset-item>
    </a-assets>

    <!-- Camera is required and must not have look-controls in MindAR -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Image target anchor -->
    <a-entity mindar-image-target="targetIndex: 0" id="imageTarget">
      <!--
        rotWrapper: only Y is ever changed by JS — X/Z stay 0.
        Position the model centred on the target plane (z slightly forward).
        Scale to fill the target card area; tweak 'scale' to taste.
      -->
      <a-entity id="rotWrapper" position="0 0 0" rotation="0 0 0">
        <a-entity
          id="model"
          gltf-model="#modelAsset"
          position="0 0 0"
          rotation="0 0 0"
          scale="1 1 1"
        ></a-entity>
      </a-entity>
    </a-entity>
  </a-scene>

  <!-- Bottom panel -->
  <div class="panel">
    <div class="panel-inner">
      <div class="info-row">
        <div class="model-info">
          <div class="label">Active Model</div>
          <div class="name" id="modelName">model.glb</div>
        </div>
        <div class="angle-wrap">
          <div class="angle-num" id="angleDisplay">0<sup>°</sup></div>
          <div class="angle-label">Y Rotation</div>
        </div>
      </div>
      <div class="controls">
        <button class="btn-icon" id="resetBtn" title="Reset rotation" aria-label="Reset rotation">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12a9 9 0 109-9 9.75 9.75 0 00-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
        </button>
        <button class="btn-rotate" id="rotateBtn" aria-label="Rotate model 45 degrees">
          ↻ &nbsp; Rotate 45°
        </button>
        <button class="btn-icon" id="infoBtn" title="Model info" aria-label="Model info">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
  (() => {
    'use strict';

    /* ── State ── */
    let targetY    = 0;   // cumulative desired rotation (degrees)
    let currentY   = 0;   // live interpolated value
    let animating  = false;
    const DURATION = 420; // ms

    /* ── Helpers ── */
    function degToRad(d) { return d * Math.PI / 180; }

    function easeInOutCubic(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function setWrapperRotY(deg) {
      const el = document.getElementById('rotWrapper');
      if (el && el.object3D) {
        el.object3D.rotation.y = degToRad(deg);
      }
    }

    function updateAngleDisplay(y) {
      const norm = ((y % 360) + 360) % 360;
      document.getElementById('angleDisplay').innerHTML = norm + '<sup>°</sup>';
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('show'), 2200);
    }

    function triggerFlash() {
      const f = document.getElementById('flash');
      f.classList.remove('go');
      void f.offsetWidth; // reflow to restart animation
      f.classList.add('go');
    }

    /* ── Smooth animation (rAF-based, no A-Frame animation component) ── */
    function animateTo(toY, onDone) {
      const fromY = currentY;
      const start = performance.now();

      function tick(now) {
        const t = Math.min((now - start) / DURATION, 1);
        currentY = fromY + (toY - fromY) * easeInOutCubic(t);
        setWrapperRotY(currentY);

        if (t < 1) {
          requestAnimationFrame(tick);
        } else {
          currentY = toY;
          setWrapperRotY(toY);
          if (typeof onDone === 'function') onDone();
        }
      }

      requestAnimationFrame(tick);
    }

    /* ── Rotate button ── */
    function rotateModel(event) {
      if (animating) return;

      const btn = document.getElementById('rotateBtn');
      animating = true;
      btn.disabled = true;
      btn.textContent = '↻  Rotating…';

      // Ripple effect
      if (event) {
        const ripple = document.createElement('span');
        ripple.className = 'ripple';
        const rect = btn.getBoundingClientRect();
        const s = Math.max(rect.width, rect.height);
        Object.assign(ripple.style, {
          width:  s + 'px',
          height: s + 'px',
          left:   (event.clientX - rect.left  - s / 2) + 'px',
          top:    (event.clientY - rect.top   - s / 2) + 'px'
        });
        btn.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
      }

      targetY += 45;
      updateAngleDisplay(targetY);

      animateTo(targetY, () => {
        animating = false;
        btn.disabled = false;
        btn.innerHTML = '↻ &nbsp; Rotate 45°';
      });
    }

    /* ── Reset button ── */
    function resetModel() {
      if (animating) return;

      // Normalise currentY to [-180, 180] so we always take the shortest arc
      currentY = ((currentY % 360) + 360) % 360;
      if (currentY > 180) currentY -= 360;

      targetY = 0;
      updateAngleDisplay(0);

      animateTo(0, () => {
        currentY = 0;
        setWrapperRotY(0);
        showToast('↺  ROTATION RESET');
      });
    }

    /* ── MindAR target events ── */
    function initTargetEvents() {
      const target = document.getElementById('imageTarget');
      if (!target) return;

      target.addEventListener('targetFound', () => {
        document.getElementById('scanHint').classList.add('hidden');
        triggerFlash();
        document.getElementById('statusDot').className  = 'status-dot';
        document.getElementById('statusText').textContent = 'TARGET LOCKED';
        showToast('✓  TARGET DETECTED');
      });

      target.addEventListener('targetLost', () => {
        document.getElementById('scanHint').classList.remove('hidden');
        document.getElementById('statusDot').className  = 'status-dot scanning';
        document.getElementById('statusText').textContent = 'SCANNING';
        showToast('TARGET LOST');
      });
    }

    /* ── Wire up buttons ── */
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('rotateBtn').addEventListener('click', rotateModel);
      document.getElementById('resetBtn').addEventListener('click', resetModel);
      initTargetEvents();
    });

  })();
  </script>
</body>
</html>
